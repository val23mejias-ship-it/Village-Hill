<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Texas Chainsaw - Pueblo Procesal</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #faa;
            padding: 12px 18px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            z-index: 10;
            pointer-events: none;
            font-size: 1rem;
            border-left: 4px solid #a22;
        }
        #ui div {
            margin: 4px 0;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: black;
            color: red;
            font-size: 2rem;
            padding: 20px 40px;
            border: 2px solid red;
            text-align: center;
            z-index: 20;
            display: none;
            white-space: nowrap;
            font-family: monospace;
        }
        #game-over button {
            margin-top: 15px;
            font-size: 1rem;
            background: #300;
            color: white;
            border: 1px solid red;
            cursor: pointer;
            padding: 5px 15px;
        }
        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #ccc;
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 4px;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>🎒 Inventario: <span id="inventory-list">Ninguno</span></div>
        <div>🔊 Ruido: <span id="noise-level">0</span>%</div>
    </div>
    <div id="game-over">
        💀 LEATHERFACE TE ATRAPÓ 💀<br>
        <button onclick="location.reload()">🔪 REINTENTAR</button>
    </div>
    <div class="controls-info">
        🎮 Movimiento: WASD | Recoge las esferas doradas | Huye del enemigo rojo
    </div>

    <!-- Importar Three.js y los addons necesarios -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
